name: Pipeline Manual - Projeto Pagamento

on:
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente de execução'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  testes:
    name: Rodar Testes (Mocha)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npx mocha test/**/*.test.js

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Exibir ambiente selecionado
        run: echo "Fazendo deploy no ambiente ${{ github.event.inputs.ambiente }}"

      - name: Deploy
        run: echo "Deploy concluído com sucesso!"